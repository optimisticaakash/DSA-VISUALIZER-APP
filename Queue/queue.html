<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Visualizer</title>
    <link rel="stylesheet" href="../global-theme.css">
    <link rel="stylesheet" href="queue.css">
</head>
<body>
    <nav class="navbar">
        <a class="nav-brand" href="../index.html">DSA Visualizer App</a>
        <div class="nav-actions">
            <a class="nav-link" href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
            <a class="nav-link" href="../index.html#about">About</a>
            <button class="theme-toggle" id="theme-toggle" type="button">Light Mode</button>
        </div>
    </nav>
    <div class="header">
        <h1>Queue (FIFO) Visualizer</h1>
        <div class="controls">
            <input type="number" id="queue-input" placeholder="Enter a number" />
            <button id="enqueue-btn">Enqueue</button>
            <button id="dequeue-btn">Dequeue</button>
        </div>
    </div>
    
    <div id="queue-container"></div>

    <script src="../theme.js"></script>
    <script src="../audio.js"></script>
    <script src="queue.js"></script>
</body>
</html>
